spring.application.name=hackathon

# Server
server.port=8080

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:hackathondb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 console
spring.h2.console.enabled=true

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JWT (dev secret; override via env in real deployments).
# Must be >= 64 bytes so jjwt can derive an HMAC-SHA key.
jwt.secret=${JWT_SECRET:ThisIsTheCognizantHackathonAdminPortalDevelopmentJwtSigningSecretKey2026!!}
jwt.expiration-ms=86400000
